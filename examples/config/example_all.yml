# yaml-language-server: $schema=https://raw.githubusercontent.com/ogen-go/ogen/main/schemas/ogen.jsonschema.json

# This file shows all available options with example values.

# Parser configuration options.
parser:
  # Enables type inference for schemas. Schema parser will try to detect schema type by its properties. Default is false.
  infer_types: true
  # Enables remote references resolving. See https://github.com/ogen-go/ogen/issues/385. Default is false.
  allow_remote: true
  # Maximum depth of schema generation. Default is 1000.
  depth_limit: 1000
  # Allowed HTTP Authorization schemes in a Security Scheme Object. Default is ones from https://www.iana.org/assignments/http-authschemes/http-authschemes.xhtml.
  authentication_schemes:
    - basic
    - bearer
    - concealed
    - digest
    - dpop
    - gnap
    - hoba
    - mutual
    - negotiate
    - oauth
    - privatetoken
    - scram-sha-1
    - scram-sha-256
    - vapid
  # Enables interpretation of cross-type schema constraints. When false, parser rejects such constraints. Default is true.
  allow_cross_type_constraints: true
  # Enables strict duplicate normalized path checks, even when they have different methods. Default is false.
  disallow_duplicate_method_paths: false

# Generator configuration options.
generator:
  # Generator features configuration.
  features:
    # Features to enable. Applied after disable list, so entries here take priority.
    # Default is:
    # - paths/client
    # - paths/server
    # - webhooks/client
    # - webhooks/server
    # - ogen/otel
    # - ogen/unimplemented
    enable:
      # Generate client code for API paths.
      - 'paths/client'
      # Generate server code for API paths.
      - 'paths/server'
      # Generate client code for webhooks.
      - 'webhooks/client'
      # Generate server code for webhooks.
      - 'webhooks/server'
      # Allow security source implementations to receive and use the generated client.
      - 'client/security/reentrant'
      # Generate per-request option functions for client requests.
      - 'client/request/options'
      # Enable client request validation before sending.
      - 'client/request/validation'
      # Generate client request editor option functions.
      - 'client/editors'
      # Enable server response validation.
      - 'server/response/validation'
      # Enable OpenTelemetry integration.
      - 'ogen/otel'
      # Generate stub handlers for unimplemented operations.
      - 'ogen/unimplemented'
      # Generate debug example tests.
      - 'debug/example_tests'
    # Features to disable. Applied before enable list, so entries in enable list take priority. Default is empty list.
    disable:
      # Disable client code generation for API paths.
      - 'paths/client'
      # Disable server code generation for API paths.
      - 'paths/server'
      # Disable client code generation for webhooks.
      - 'webhooks/client'
      # Disable server code generation for webhooks.
      - 'webhooks/server'
      # Disable passing the generated client to security source callbacks.
      - 'client/security/reentrant'
      # Disable per-request option functions for client requests.
      - 'client/request/options'
      # Disable client request validation before sending.
      - 'client/request/validation'
      # Disable client request editor option functions.
      - 'client/editors'
      # Disable server response validation.
      - 'server/response/validation'
      # Disable OpenTelemetry integration.
      - 'ogen/otel'
      # Disable stub handlers for unimplemented operations.
      - 'ogen/unimplemented'
      # Disable debug example tests.
      - 'debug/example_tests'
    # Start from an empty feature set instead of default features. Default is false.
    disable_all: true

  # Operation filtering configuration options.
  filters:
    # Regular expression to filter paths. If empty, all paths are accepted. Default is empty string.
    path_regex: ".*"
    # HTTP methods to keep. If empty, all methods are accepted. Default is empty list.
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "HEAD", "OPTIONS", "TRACE"]

  # Not implemented functions to skip during generation. "all" means skip all not-implemented generation errors. Default is empty list.
  ignore_not_implemented: ["all"]
  # Controls convenient error helper generation. See https://ogen.dev/docs/concepts/convenient_errors. Default is "auto".
  convenient_errors: "auto"
  # Maps exact content types to known encodings. Default is empty object.
  content_type_aliases:
    "text/json": "application/json"
  # Default encoding to use for wildcard content types (e.g. */* or application/*). If empty, wildcard content types are treated as unsupported. Default is empty string.
  wildcard_content_type_default: "application/json"

# Path to write the expanded OpenAPI spec file. If empty, the expanded spec is not written. Default is empty string.
expand: ""
